spring:
  application:
    name: sistema-veterinaria
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/veterinaria_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

file:
  upload-dir: ${UPLOAD_DIR:uploads}