<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vet-blue: #0A3D91; --vet-red: #D32F2F; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 420px; width: 100%; border-radius: 1rem; border: none; box-shadow: 0 10px 30px rgba(10, 61, 145, 0.15); border-top: 6px solid var(--vet-blue); }
        .btn-login { background-color: var(--vet-red); color: white; border: none; font-weight: 600; padding: 12px; }
        .btn-login:hover { background-color: #b71c1c; color: white; }
        .form-control:focus { border-color: var(--vet-blue); box-shadow: 0 0 0 0.25rem rgba(10, 61, 145, 0.2); }
        .vet-brand { color: var(--vet-blue); font-weight: 700; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="card login-card p-4">
        <div class="card-body">
            <div class="text-center mb-4">
                <h1 class="h2 vet-brand">HatunVet</h1>
                <p class="text-muted">Ingresa tus credenciales</p>
            </div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nombre de Usuario</label>
                    <input type="text" name="usuario" class="form-control" placeholder="Ej: admin" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="clave" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-login w-100">Iniciar Sesión</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:inline="javascript">
    /*[# th:if="${error}"]*/
    Swal.fire({ icon: 'error', title: 'Error', text: /*[[${error}]]*/ 'Error', confirmButtonColor: '#0A3D91' });
    /*[/]*/
    /*[# th:if="${logout}"]*/
    Swal.fire({ icon: 'success', title: 'Adiós', text: /*[[${logout}]]*/ 'Sesión cerrada', timer: 2000, showConfirmButton: false });
    /*[/]*/
</script>
</body>
</html>
