<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Configuración - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <style>
        .section-block {
            background: #fff;
            border-radius: 16px;
            border: 1.5px solid rgba(10,61,145,0.10);
            box-shadow: 0 2px 12px rgba(10,61,145,0.06);
            padding: 24px 26px;
            margin-bottom: 20px;
        }
        .section-block-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .6px;
            text-transform: uppercase;
            color: var(--vet-blue, #0A3D91);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1.5px solid rgba(10,61,145,0.08);
        }

        /* Horario cards */
        .horario-card {
            background: #f0f4fa;
            border-radius: 12px;
            border: 1.5px solid rgba(10,61,145,0.10);
            padding: 14px 16px;
        }
        .horario-dia {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .6px;
            text-transform: uppercase;
            color: #8a9bc0;
            margin-bottom: 6px;
        }

        /* Logo preview */
        .logo-preview-box {
            background: #f0f4fa;
            border-radius: 12px;
            border: 1.5px dashed rgba(10,61,145,0.20);
            padding: 20px;
            text-align: center;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tabla imágenes */
        .img-table th {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .6px;
            text-transform: uppercase;
            color: #8a9bc0;
            border-bottom: 1.5px solid rgba(10,61,145,0.08);
            padding: 8px 12px;
        }
        .img-table td { padding: 10px 12px; vertical-align: middle; border-bottom: 1px solid rgba(10,61,145,0.06); font-size: 13px; }
    </style>
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/configuracion')}"></div>

    <main class="main-content w-100 p-4">

        <!-- Header -->
        <header class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h2 class="page-title">Configuración General</h2>
                <p class="page-subtitle">Variables universales de la página pública</p>
            </div>
            <button id="btnGuardarConfiguracion" class="btn-danger-vet d-flex align-items-center gap-2">
                <i class="bi bi-floppy"></i> Guardar Cambios
            </button>
        </header>

        <div class="row g-4">

            <!-- Columna izquierda -->
            <div class="col-lg-7">

                <!-- Datos básicos -->
                <div class="section-block">
                    <div class="section-block-title">
                        <i class="bi bi-building"></i> Datos de la Veterinaria
                    </div>
                    <form id="formConfiguracion" class="row g-3">
                        <input type="hidden" id="id" name="id">

                        <div class="col-12">
                            <label class="label-vet">Nombre de la veterinaria</label>
                            <input type="text" id="nombreVeterinaria" class="input-vet" maxlength="150" required>
                        </div>
                        <div class="col-md-6">
                            <label class="label-vet">Teléfono</label>
                            <input type="text" id="telefono" class="input-vet" maxlength="30">
                        </div>
                        <div class="col-md-6">
                            <label class="label-vet">Correo</label>
                            <input type="email" id="correo" class="input-vet" maxlength="150">
                        </div>
                        <div class="col-12">
                            <label class="label-vet">Dirección</label>
                            <input type="text" id="direccion" class="input-vet" maxlength="255">
                        </div>
                        <div class="col-md-6">
                            <label class="label-vet">Facebook</label>
                            <input type="text" id="facebook" class="input-vet" maxlength="255">
                        </div>
                        <div class="col-md-6">
                            <label class="label-vet">Instagram</label>
                            <input type="text" id="instagram" class="input-vet" maxlength="255">
                        </div>
                        <div class="col-md-6">
                            <label class="label-vet">WhatsApp</label>
                            <input type="text" id="whatsapp" class="input-vet" maxlength="80">
                        </div>
                        <div class="col-md-6">
                            <label class="label-vet">Logo</label>
                            <input type="file" id="logoFile" class="input-vet" accept="image/*" style="padding:6px 10px;">
                        </div>
                    </form>
                </div>

                <!-- Contenido hero -->
                <div class="section-block">
                    <div class="section-block-title">
                        <i class="bi bi-megaphone"></i> Contenido de la Página Principal
                    </div>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="label-vet">Texto Hero (título principal)</label>
                            <textarea id="textoHero" class="input-vet" rows="2" maxlength="500"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="label-vet">Subtítulo Hero</label>
                            <textarea id="subtituloHero" class="input-vet" rows="2" maxlength="500"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="label-vet">Misión</label>
                            <textarea id="mision" class="input-vet" rows="3"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="label-vet">Visión</label>
                            <textarea id="vision" class="input-vet" rows="3"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Horario -->
                <div class="section-block">
                    <div class="section-block-title">
                        <i class="bi bi-clock"></i> Horario de Atención
                    </div>
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="horario-card">
                                <div class="horario-dia"><i class="bi bi-calendar-week me-1"></i> Lunes — Viernes</div>
                                <input type="text" id="horarioLunesViernes" class="input-vet"
                                       placeholder="Ej: 8:00 AM - 8:00 PM" maxlength="50">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="horario-card">
                                <div class="horario-dia"><i class="bi bi-calendar2 me-1"></i> Sábado</div>
                                <input type="text" id="horarioSabado" class="input-vet"
                                       placeholder="Ej: 9:00 AM - 6:00 PM" maxlength="50">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="horario-card">
                                <div class="horario-dia"><i class="bi bi-calendar2-x me-1"></i> Domingo</div>
                                <input type="text" id="horarioDomingo" class="input-vet"
                                       placeholder="Ej: Cerrado" maxlength="50">
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Columna derecha -->
            <div class="col-lg-5">

                <!-- Logo preview -->
                <div class="section-block mb-4">
                    <div class="section-block-title">
                        <i class="bi bi-image"></i> Vista Previa del Logo
                    </div>
                    <div class="logo-preview-box">
                        <img id="logoPreview" src="" alt="Logo" class="img-fluid" style="max-height:140px; display:none;">
                        <div id="logoPlaceholder" class="text-muted">
                            <i class="bi bi-image fs-1 d-block mb-2 opacity-25"></i>
                            Sin logo cargado
                        </div>
                    </div>
                </div>

                <!-- Imágenes landing -->
                <div class="section-block">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="section-block-title mb-0 border-0 pb-0">
                            <i class="bi bi-images"></i> Imágenes del Landing
                        </div>
                        <button id="btnNuevaImagen" class="btn-primary-vet btn-sm d-flex align-items-center gap-1" style="font-size:12px; padding:6px 14px;">
                            <i class="bi bi-plus-lg"></i> Nueva
                        </button>
                    </div>
                    <table class="table img-table w-100">
                        <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Tipo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="landingImagesBody"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </main>
</div>

<!-- Modal Imagen Landing -->
<div class="modal fade" id="landingImagenModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border-radius:16px; overflow:hidden; border:none;">
            <div class="modal-header text-white" style="background: var(--vet-blue);">
                <h5 class="modal-title fw-bold" id="landingModalTitle">
                    <i class="bi bi-image me-2"></i> Nueva Imagen
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formLandingImagen" class="row g-3">
                    <input type="hidden" id="landingId">
                    <div class="col-md-6">
                        <label class="label-vet">Tipo</label>
                        <input type="text" id="tipo" class="input-vet" maxlength="50" required>
                    </div>
                    <div class="col-md-6">
                        <label class="label-vet">Estado</label>
                        <select id="estado" class="input-vet">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="label-vet">Imagen</label>
                        <input type="file" id="imagenFile" class="input-vet" accept="image/*" style="padding:6px 10px;">
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="background:#f0f4fa;">
                <button type="button" class="btn-secondary-vet" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="formLandingImagen" class="btn-primary-vet">Guardar Imagen</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/configuracion.js}"></script>
</body>
</html>
