<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/productos/listar')}"></div>

    <main class="main-content w-100">
        <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">Catálogo de Productos</h2>
            <button id="btnNuevoRegistro" class="btn fw-bold" style="background-color: var(--vet-red); color: white;">
                <i class="bi bi-box-seam me-1"></i> Nuevo Producto
            </button>
        </header>

        <div class="card card-custom p-4 bg-white">
            <table id="tablaProductos" class="table table-hover w-100 align-middle">
                <thead class="table-light">
                <tr>
                    <th>Imagen</th>
                    <th>Código</th>
                    <th>Nombre del Producto</th>
                    <th>Categoría</th>
                    <th>Precio (S/)</th>
                    <th>Stock</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal fade" id="productoModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background-color: var(--vet-blue); color: white;">
                <h5 class="modal-title" id="modalTitle">Agregar Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formProducto">
                    <input type="hidden" id="id" name="id">

                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label text-muted fw-bold">Código:</label>
                            <input type="text" id="codigo" class="form-control" placeholder="Ej: PROD001" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label text-muted fw-bold">Nombre del Producto:</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-muted fw-bold">Categoría:</label>
                            <select id="id_categoria" class="form-select" required>
                                <option value="">Seleccione una categoría...</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-muted fw-bold">Precio Unit. (S/):</label>
                            <input type="number" id="precio" class="form-control" step="0.01" min="0" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-muted fw-bold">Stock Inicial:</label>
                            <input type="number" id="stock" class="form-control" min="0" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label text-muted fw-bold">Descripción (Opcional):</label>
                            <textarea id="descripcion" class="form-control" rows="2"></textarea>
                        </div>

                        <div class="col-12">
                            <label class="form-label text-muted fw-bold">Imagen del Producto:</label>
                            <input type="file" id="imagenFile" class="form-control" accept="image/*">
                            <small class="text-secondary">Sube una foto clara del producto. Si editas y dejas esto vacío, se mantiene la foto anterior.</small>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="formProducto" class="btn" style="background-color: var(--vet-blue); color: white;">Guardar Producto</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/productos.js}"></script>

</body>
</html>
