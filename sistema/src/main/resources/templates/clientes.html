<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes e Historial - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/clientes')}"></div>

    <main class="main-content w-100 p-4">
        <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">Gestión de Clientes</h2>
            <button class="btn btn-primary shadow-sm" id="btnNuevoCliente">
                <i class="bi bi-person-plus-fill me-2"></i> Nuevo Cliente
            </button>
        </header>

        <!-- Tabla Principal -->
        <div class="card card-custom p-4 bg-white shadow-sm">
            <table id="tablaClientes" class="table table-hover w-100 align-middle">
                <thead class="table-light">
                <tr>
                    <th>Documento</th>
                    <th>Nombre / Razón Social</th>
                    <th>Contacto</th>
                    <th>Registro</th>
                    <th class="text-center">Historial 360</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
</div>

<!-- Modal Registro Cliente -->
<div class="modal fade" id="modalCliente" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formCliente">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="bi bi-person-lines-fill me-2"></i> Datos del Cliente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Tipo Doc.</label>
                            <select id="tipoDocumento" class="form-select" required>
                                <option value="1">DNI</option>
                                <option value="6">RUC</option>
                                <option value="4">CE</option>
                            </select>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label small fw-bold">Número de Documento</label>
                            <div class="input-group">
                                <input type="text" id="numeroDocumento" class="form-control" required>
                                <button class="btn btn-outline-primary" type="button" id="btnBuscarDoc" title="Buscar en RENIEC/SUNAT">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Nombre Completo / Razón Social</label>
                            <input type="text" id="nombreCompleto" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold"><i class="bi bi-whatsapp text-success me-1"></i> Teléfono/Celular</label>
                            <input type="text" id="telefono" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold"><i class="bi bi-envelope text-secondary me-1"></i> Correo Electrónico</label>
                            <input type="email" id="correo" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Cliente</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- MODAL GIGANTE: HISTORIAL 360 -->
<div class="modal fade" id="modalHistorial" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title"><i class="bi bi-clock-history me-2"></i> Historial 360: <span id="lblHistorialNombre" class="fw-bold text-warning"></span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body bg-light">

                <!-- Pestañas -->
                <ul class="nav nav-tabs shadow-sm bg-white" id="historialTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active fw-bold" data-bs-toggle="tab" data-bs-target="#tabPetshop" type="button">
                            <i class="bi bi-cart-check text-primary me-1"></i> Petshop y Farmacia
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link fw-bold" data-bs-toggle="tab" data-bs-target="#tabGrooming" type="button">
                            <i class="bi bi-scissors text-purple me-1" style="color: #6f42c1;"></i> Baños y Cortes
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link fw-bold text-muted" data-bs-toggle="tooltip" title="Próximo Módulo" disabled>
                            <i class="bi bi-heart-pulse text-danger me-1"></i> Historial Clínico
                        </button>
                    </li>
                </ul>

                <!-- Contenido Pestañas -->
                <div class="tab-content bg-white border border-top-0 p-3 shadow-sm rounded-bottom">

                    <!-- Pestaña Petshop -->
                    <div class="tab-pane fade show active" id="tabPetshop">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover align-middle mb-0" id="tablaHistorialPetshop">
                                <thead class="table-light">
                                <tr>
                                    <th>Fecha Venta</th>
                                    <th>Comprobante</th>
                                    <th>Total Pagado</th>
                                    <th>Estado</th>
                                </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Pestaña Peluquería -->
                    <div class="tab-pane fade" id="tabGrooming">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover align-middle mb-0" id="tablaHistorialPeluqueria">
                                <thead class="table-light">
                                <tr>
                                    <th>Fecha Atención</th>
                                    <th>Mascota</th>
                                    <th>Servicio Realizado</th>
                                    <th>Precio Cobrado</th>
                                    <th>Estado</th>
                                </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/clientes.js}"></script>

</body>
</html>
