<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/dashboard')}"></div>

    <main class="main-content w-100">
        <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">Panel de Control</h2>
            <div class="text-muted" th:text="${#calendars.format(#calendars.createNow(), 'dd MMMM yyyy')}"></div>
        </header>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card card-custom bg-white p-4">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle p-3 bg-primary bg-opacity-10 text-primary me-3">
                            <i class="bi bi-people-fill fs-3"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1">Usuarios Activos</h6>
                            <h3 class="fw-bold mb-0" th:text="${totalUsuarios}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-custom bg-white p-4 opacity-50">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle p-3 bg-danger bg-opacity-10 text-danger me-3">
                            <i class="bi bi-heart-pulse-fill fs-3"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1">Mascotas</h6>
                            <h3 class="fw-bold mb-0">Próximamente</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5 p-5 bg-white rounded-4 shadow-sm text-center">
            <h1 class="display-6 fw-bold" style="color: var(--vet-blue)">Bienvenido a HatunVet</h1>
            <p class="lead text-muted">Gestión veterinaria.</p>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
