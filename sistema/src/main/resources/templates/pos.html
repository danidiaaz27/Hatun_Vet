<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Punto de Venta - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <style>
        body { background: #f0f4fa; overflow: hidden; }

        /* ── Wrapper principal ── */
        .pos-wrapper {
            margin-left: 260px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Topbar ── */
        .pos-topbar {
            background: #fff;
            border-bottom: 1.5px solid rgba(10,61,145,0.10);
            padding: 11px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 1px 6px rgba(10,61,145,0.06);
        }
        .pos-title { font-size: 14px; font-weight: 700; color: #1a2035; display: flex; align-items: center; gap: 8px; }
        .pos-reloj  { font-size: 13px; font-weight: 600; color: #6b7a99; }

        /* ── Layout 2 columnas ── */
        .pos-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* ── Panel productos (izquierda) ── */
        .pos-productos {
            flex: 1;
            min-width: 0;
            padding: 18px 20px;
            overflow-y: auto;
            background: #f0f4fa;
        }

        .search-wrapper { position: relative; margin-bottom: 18px; }
        .search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #8a9bc0; font-size: 14px; }
        .pos-search {
            background: #fff;
            border: 1.5px solid rgba(10,61,145,0.15);
            border-radius: 50px;
            padding: 9px 18px 9px 38px;
            width: 100%;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            transition: border-color .2s;
        }
        .pos-search:focus { border-color: var(--vet-blue, #0A3D91); }

        /* Grid productos */
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 14px;
        }

        .product-card {
            background: #fff;
            border-radius: 12px;
            border: 1.5px solid rgba(10,61,145,0.08);
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow .2s, transform .2s;
            box-shadow: 0 2px 8px rgba(10,61,145,0.05);
        }
        .product-card:hover { box-shadow: 0 6px 20px rgba(10,61,145,0.13); transform: translateY(-2px); }

        .product-card-img {
            width: 100%; height: 100px;
            background: #f0f4fa;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .product-card-img img { width: 100%; height: 100px; object-fit: contain; padding: 6px; }
        .product-card-img .no-img { font-size: 32px; color: #c8d3e8; }

        .product-card-body { padding: 9px 11px 11px; }

        .product-badge { font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; padding: 2px 7px; border-radius: 50px; margin-bottom: 4px; display: inline-block; }
        .badge-stock  { background: #e8f5ee; color: #1a6e40; }
        .badge-pocas  { background: #fff8e1; color: #b45309; }
        .badge-agotado{ background: #fce8e8; color: #b71c1c; }

        .product-nombre { font-size: 12px; font-weight: 700; color: #1a2035; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-precio { font-size: 14px; font-weight: 800; color: var(--vet-blue, #0A3D91); }
        .product-stock-txt { font-size: 11px; color: #8a9bc0; }

        .btn-agregar {
            width: 100%; margin-top: 7px;
            background: #f0f4fa; border: none; border-radius: 7px; padding: 6px;
            font-size: 12px; font-weight: 600; color: var(--vet-blue, #0A3D91);
            cursor: pointer; transition: background .15s;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .btn-agregar:hover { background: var(--vet-blue, #0A3D91); color: #fff; }

        .productos-empty { grid-column: 1/-1; text-align: center; padding: 50px 20px; color: #8a9bc0; }
        .productos-empty i { font-size: 42px; display: block; margin-bottom: 10px; }

        /* ── Panel carrito (derecha) ── */
        .pos-carrito {
            width: 320px;
            flex-shrink: 0;
            background: #fff;
            border-left: 1.5px solid rgba(10,61,145,0.10);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .carrito-header { padding: 14px 16px 10px; border-bottom: 1px solid rgba(10,61,145,0.08); flex-shrink: 0; }
        .carrito-titulo { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #8a9bc0; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .carrito-count { background: var(--vet-red, #D32F2F); color: #fff; border-radius: 50px; padding: 1px 7px; font-size: 10px; font-weight: 700; }

        /* Inputs cliente */
        .cliente-field {
            background: #f0f4fa;
            border: 1.5px solid rgba(10,61,145,0.12);
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 12.5px;
            font-family: inherit;
            color: #1a2035;
            outline: none;
            width: 100%;
            transition: border-color .2s;
            margin-bottom: 7px;
        }
        .cliente-field:focus { border-color: var(--vet-blue, #0A3D91); background: #fff; }

        .doc-row { display: flex; gap: 6px; margin-bottom: 7px; }
        .doc-row select { width: 80px; flex-shrink: 0; }
        .doc-row input  { flex: 1; margin-bottom: 0; }
        .doc-row select, .doc-row input { background: #f0f4fa; border: 1.5px solid rgba(10,61,145,0.12); border-radius: 8px; padding: 7px 8px; font-size: 12px; font-family: inherit; outline: none; }
        .doc-row select:focus, .doc-row input:focus { border-color: var(--vet-blue, #0A3D91); }

        .btn-buscar-doc { background: var(--vet-blue, #0A3D91); border: none; border-radius: 8px; color: #fff; padding: 7px 11px; cursor: pointer; flex-shrink: 0; font-size: 13px; }
        .btn-buscar-doc:hover { background: #072d6b; }

        /* Select método de pago */
        .metodo-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #8a9bc0; margin-bottom: 5px; display: block; }
        .metodo-select {
            width: 100%;
            background: #f0f4fa;
            border: 1.5px solid rgba(10,61,145,0.12);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-family: inherit;
            color: #1a2035;
            outline: none;
            cursor: pointer;
            transition: border-color .2s;
            appearance: auto;
        }
        .metodo-select:focus { border-color: var(--vet-blue, #0A3D91); background: #fff; }

        /* Items carrito */
        .carrito-items { flex: 1; overflow-y: auto; padding: 10px 16px; min-height: 0; scrollbar-width: none; }
        .carrito-items::-webkit-scrollbar { width: 0; }

        .carrito-vacio { text-align: center; color: #8a9bc0; padding: 30px 10px; }
        .carrito-vacio i { font-size: 36px; display: block; margin-bottom: 8px; }

        .carrito-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(10,61,145,0.06); }

        .item-thumb { width: 36px; height: 36px; border-radius: 7px; background: #f0f4fa; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
        .item-thumb img { width: 36px; height: 36px; object-fit: contain; }
        .item-thumb i { font-size: 16px; color: #c8d3e8; }

        .item-info { flex: 1; min-width: 0; }
        .item-nombre { font-size: 12px; font-weight: 600; color: #1a2035; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-precio-unit { font-size: 10px; color: #8a9bc0; }

        .item-qty { display: flex; align-items: center; gap: 3px; }
        .qty-btn { width: 22px; height: 22px; border-radius: 5px; border: 1.5px solid rgba(10,61,145,0.15); background: #f0f4fa; color: #1a2035; font-weight: 700; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
        .qty-btn:hover { background: var(--vet-blue, #0A3D91); color: #fff; border-color: var(--vet-blue); }
        .qty-num { font-size: 12px; font-weight: 700; min-width: 18px; text-align: center; }

        .item-total { font-size: 12px; font-weight: 700; color: #1a2035; min-width: 50px; text-align: right; }
        .item-del { background: none; border: none; color: #c8d3e8; cursor: pointer; font-size: 14px; padding: 0 2px; transition: color .15s; }
        .item-del:hover { color: var(--vet-red, #D32F2F); }

        /* Footer totales */
        .carrito-footer { padding: 12px 16px 16px; border-top: 1px solid rgba(10,61,145,0.08); flex-shrink: 0; }
        .total-row { display: flex; justify-content: space-between; font-size: 12px; color: #6b7a99; margin-bottom: 3px; }
        .total-final { display: flex; justify-content: space-between; align-items: baseline; margin: 8px 0 12px; padding-top: 8px; border-top: 1.5px solid rgba(10,61,145,0.10); }
        .total-label { font-size: 13px; font-weight: 700; color: #1a2035; }
        .total-monto { font-size: 22px; font-weight: 800; color: var(--vet-blue, #0A3D91); }

        .btn-finalizar { width: 100%; background: var(--vet-blue, #0A3D91); color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; box-shadow: 0 4px 14px rgba(10,61,145,0.22); transition: background .18s, transform .15s; }
        .btn-finalizar:hover { background: #072d6b; transform: translateY(-1px); }
        .btn-finalizar:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        .btn-anular { width: 100%; background: transparent; border: none; color: #8a9bc0; font-size: 11px; font-weight: 600; cursor: pointer; padding: 6px; margin-top: 5px; border-radius: 7px; transition: color .15s; }
        .btn-anular:hover { color: var(--vet-red, #D32F2F); }

        @media (max-width: 767px) {
            .pos-wrapper { margin-left: 0; }
            .pos-carrito { width: 280px; }
        }
    </style>
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/ventas/pos')}"></div>

    <div class="pos-wrapper">

        <!-- Topbar -->
        <div class="pos-topbar">
            <div class="pos-title">
                <i class="bi bi-cart-check-fill text-danger"></i> PUNTO DE VENTA
            </div>
            <div class="d-flex align-items-center gap-3">
                <button type="button" class="btn-danger-vet d-flex align-items-center gap-2" onclick="abrirModalCitasCobro()">
                    <i class="bi bi-heart-pulse-fill"></i> Cobrar Citas Médicas
                </button>
                <button type="button" class="btn-primary-vet d-flex align-items-center gap-2" onclick="abrirModalGroomingCobro()">
                    <i class="bi bi-scissors"></i> Cobrar Grooming
                </button>
                <div class="pos-reloj" id="relojActual">00:00:00</div>
            </div>
        </div>

        <!-- Layout -->
        <div class="pos-layout">

            <!-- Productos -->
            <div class="pos-productos">
                <div class="search-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="text" id="inputBuscarProducto" class="pos-search"
                           placeholder="Buscar por código, nombre o categoría..." autocomplete="off">
                </div>
                <div class="productos-grid" id="resultadosBusqueda">
                    <div class="productos-empty">
                        <i class="bi bi-box-seam"></i>
                        Busca un producto para empezar a vender
                    </div>
                </div>
            </div>

            <!-- Carrito -->
            <div class="pos-carrito">

                <div class="carrito-header">
                    <div class="carrito-titulo">
                        <span><i class="bi bi-person me-1"></i> Información Cliente</span>
                        <span class="carrito-count" id="carritoCount">0 items</span>
                    </div>

                    <!-- Doc -->
                    <div class="doc-row">
                        <select id="tipoDoc">
                            <option value="1">Boleta</option>
                            <option value="6">Factura</option>
                        </select>
                        <input type="text" id="numDoc" placeholder="N° Documento">
                        <button class="btn-buscar-doc" id="btnBuscarDoc" title="Buscar RENIEC/SUNAT">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>

                    <!-- Nombre -->
                    <input type="text" id="nombreCliente" class="cliente-field" placeholder="Nombre o Razón Social">

                    <!-- Método de pago -->
                    <label class="metodo-label"><i class="bi bi-credit-card me-1"></i> Método de Pago</label>
                    <select id="metodoPago" class="metodo-select">
                        <option value="efectivo">Efectivo</option>
                        <option value="yape">Yape</option>
                        <option value="plin">Plin</option>
                    </select>
                </div>

                <!-- Items -->
                <div class="carrito-items" id="listaCarrito">
                    <div class="carrito-vacio">
                        <i class="bi bi-cart3"></i>
                        El carrito está vacío
                    </div>
                </div>

                <!-- Totales -->
                <div class="carrito-footer">
                    <div class="total-row"><span>Subtotal (sin IGV)</span><span>S/ <span id="lblOpGravadas">0.00</span></span></div>
                    <div class="total-row"><span>IGV (18%)</span><span>S/ <span id="lblIgv">0.00</span></span></div>
                    <div class="total-final">
                        <span class="total-label">TOTAL</span>
                        <span class="total-monto">S/ <span id="lblTotal">0.00</span></span>
                    </div>
                    <button class="btn-finalizar" id="btnCobrar">
                        <i class="bi bi-receipt"></i> FINALIZAR VENTA
                    </button>
                    <button class="btn-anular" onclick="anularOrden()">Anular Orden</button>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Modal Citas -->
<div class="modal fade" id="modalCitasCobro" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border-radius:16px; overflow:hidden; border:none;">
            <div class="modal-header text-white" style="background: var(--vet-red, #D32F2F);">
                <h5 class="modal-title fw-bold"><i class="bi bi-heart-pulse me-2"></i> Citas Finalizadas — Pendientes de Cobro</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="background:#f0f4fa;">
                <div id="listaCitasPorCobrar"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Grooming -->
<div class="modal fade" id="modalGroomingCobro" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border-radius:16px; overflow:hidden; border:none;">
            <div class="modal-header text-white" style="background: var(--vet-blue, #0A3D91);">
                <h5 class="modal-title fw-bold"><i class="bi bi-scissors me-2"></i> Servicios de Grooming — Pendientes de Cobro</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="background:#f0f4fa;">
                <div id="listaGroomingPorCobrar"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:src="@{/js/pos/ventas-utils.js}"></script>
<script th:src="@{/js/pos/ventas-cliente.js}"></script>
<script th:src="@{/js/pos/ventas-productos.js}"></script>
<script th:src="@{/js/pos/ventas-promociones.js}"></script>
<script th:src="@{/js/pos/ventas-totales.js}"></script>
<script th:src="@{/js/pos/ventas-carrito-render.js}"></script>
<script th:src="@{/js/pos/ventas-carrito.js}"></script>
<script th:src="@{/js/pos/ventas-importar-citas.js}"></script>
<script th:src="@{/js/pos/ventas-importar-grooming.js}"></script>
<script th:src="@{/js/pos/ventas-cobro.js}"></script>
<script th:src="@{/js/pos/ventas-main.js}"></script>
</body>
</html>
