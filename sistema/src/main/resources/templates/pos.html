<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Punto de Venta - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <style>
        .product-card { cursor: pointer; transition: transform 0.2s; }
        .product-card:hover { transform: scale(1.02); border-color: var(--vet-blue) !important; }
        .cart-container { height: 65vh; overflow-y: auto; }
        .ticket-bg { background-color: #fcfcfc; border-left: 4px dashed #ccc; }
    </style>
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/ventas/pos')}"></div>

    <main class="main-content w-100 p-3">
        <header class="d-flex justify-content-between align-items-center mb-3 bg-white p-3 rounded shadow-sm">
            <h2 class="h5 mb-0 fw-bold" style="color: var(--vet-blue)">
                <i class="bi bi-cart-check-fill me-2 text-danger"></i> Punto de Venta
            </h2>
            <div class="text-muted" id="relojActual">00:00:00</div>
        </header>

        <div class="row g-3">
            <div class="col-lg-7">
                <div class="card card-custom h-100">
                    <div class="card-body">
                        <div class="input-group mb-4 shadow-sm">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" id="inputBuscarProducto" class="form-control border-start-0 form-control-lg" placeholder="Buscar por código o nombre (Ej: PROD001 o Laptop)..." autocomplete="off">
                        </div>

                        <div id="resultadosBusqueda" class="row g-3">
                            <div class="col-12 text-center text-muted mt-5">
                                <i class="bi bi-box-seam fs-1 d-block mb-2"></i>
                                Busca un producto para empezar a vender
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card card-custom h-100 ticket-bg">
                    <div class="card-body d-flex flex-column">

                        <div class="row g-2 mb-3 pb-3 border-bottom">
                            <div class="col-4">
                                <select id="tipoDoc" class="form-select form-select-sm">
                                    <option value="1">DNI (Boleta)</option>
                                    <option value="6">RUC (Factura)</option>
                                </select>
                            </div>
                            <div class="col-8">
                                <div class="input-group input-group-sm shadow-sm">
                                    <input type="text" id="numDoc" class="form-control border-end-0" placeholder="N° Documento" required>
                                    <button class="btn btn-outline-secondary bg-white text-primary border-start-0 border" type="button" id="btnBuscarDoc" title="Buscar en RENIEC/SUNAT">
                                        <i class="bi bi-search"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-12">
                                <input type="text" id="nombreCliente" class="form-control form-control-sm" placeholder="Nombre o Razón Social" required>
                            </div>
                            <div class="col-12">
                                <input type="text" id="direccionCliente" class="form-control form-control-sm" placeholder="Dirección (Obligatorio para Factura)">
                            </div>
                        </div>

                        <div class="cart-container flex-grow-1 mb-3">
                            <table class="table table-sm align-middle" id="tablaCarrito">
                                <thead class="table-light">
                                <tr>
                                    <th>Producto</th>
                                    <th class="text-center" width="80">Cant.</th>
                                    <th class="text-end" width="90">Total</th>
                                    <th width="40"></th>
                                </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>

                        <div class="bg-white p-3 rounded border">
                            <div class="d-flex justify-content-between mb-1 text-muted">
                                <span>Op. Gravadas:</span>
                                <span>S/ <span id="lblOpGravadas">0.00</span></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2 text-muted">
                                <span>IGV (18%):</span>
                                <span>S/ <span id="lblIgv">0.00</span></span>
                            </div>
                            <div class="d-flex justify-content-between mb-3 border-top pt-2">
                                <span class="fs-5 fw-bold" style="color: var(--vet-blue)">TOTAL A PAGAR:</span>
                                <span class="fs-4 fw-bold text-danger">S/ <span id="lblTotal">0.00</span></span>
                            </div>

                            <button id="btnCobrar" class="btn btn-lg w-100 fw-bold shadow-sm" style="background-color: var(--vet-blue); color: white;">
                                <i class="bi bi-receipt me-2"></i> Procesar Venta
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/pos.js}"></script>

</body>
</html>
