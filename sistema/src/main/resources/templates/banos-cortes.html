<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Baños y Cortes - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <style>
        .mascota-result-item { cursor: pointer; transition: background-color 0.15s ease; }
        .mascota-result-item:hover, .mascota-result-item.active { background-color: rgba(13, 110, 253, 0.08); }
        .avatar-pill-sm {
            width: 36px; height: 36px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--vet-blue, #0d6efd); color: #fff; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/banos-cortes')}"></div>

    <main class="main-content w-100 p-4">
        <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">Control de Baños y Cortes</h2>
            <button class="btn btn-primary shadow-sm" id="btnNuevoServicio">
                <i class="bi bi-plus-circle me-2"></i> Nuevo Registro
            </button>
        </header>

        <div class="card card-custom p-4 bg-white shadow-sm">
            <table id="tablaServicios" class="table table-hover w-100">
                <thead class="table-light">
                <tr>
                    <th>Fecha</th>
                    <th>Mascota</th>
                    <th>Dueño</th>
                    <th>Servicio</th>
                    <th>Precio (S/)</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal fade" id="modalServicio" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formServicio">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Registrar Servicio</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="mascotaId" value="">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase text-muted mb-1">
                                <i class="bi bi-paw me-1"></i> Buscar mascota del padrón (ID o nombre)
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-search text-primary"></i></span>
                                <input type="text" class="form-control" id="txtBuscarMascota" placeholder="Ej. 12, Luna, Toby..." autocomplete="off">
                                <button class="btn btn-primary" type="button" id="btnBuscarMascota">Buscar</button>
                            </div>
                            <small class="text-muted">Mismo buscador dinámico que el módulo de Mascotas.</small>
                        </div>

                        <div class="col-12">
                            <div id="panelResultadosMascota" class="list-group shadow-sm d-none" style="max-height: 220px; overflow-y: auto;"></div>
                            <div id="panelMascotaSeleccionada" class="alert alert-light border d-none mb-0">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="avatar-pill-sm" id="lblMascotaInicial">?</div>
                                    <div class="flex-grow-1">
                                        <div class="fw-bold" id="lblMascotaNombre">—</div>
                                        <small class="text-muted" id="lblMascotaDetalle">—</small>
                                        <div class="small mt-1" id="lblDuenoDetalle">—</div>
                                        <div class="small text-muted" id="lblFechaRegistroMascota"></div>
                                    </div>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" id="btnLimpiarMascota" title="Cambiar mascota">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-bold">Tipo de Servicio</label>
                            <div class="input-group">
                                <select id="tipoServicioSelect" class="form-select"></select>
                                <input type="text" id="tipoServicioInput" class="form-control d-none" placeholder="Escribe el nombre del nuevo servicio...">
                                <button class="btn btn-outline-secondary" type="button" id="btnAlternarTipo" title="Añadir nuevo servicio">
                                    <i class="bi bi-plus-lg"></i> Nuevo
                                </button>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-bold">Detalles / Observaciones</label>
                            <textarea id="detallesExtra" class="form-control" rows="2" placeholder="Ej: Shampoo de avena, corte estilo león..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-danger">Precio a Cobrar (S/)</label>
                            <input type="number" id="precio" class="form-control form-control-lg fw-bold" step="0.50" min="1" required>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnGuardarServicio">Guardar Registro</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/banos-cortes.js}"></script>

</body>
</html>
