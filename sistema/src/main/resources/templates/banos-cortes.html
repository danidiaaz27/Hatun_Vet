<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Baños y Cortes - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/banos-cortes')}"></div>

    <main class="main-content w-100 p-4">
        <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">Control de Baños y Cortes</h2>
            <button class="btn btn-primary shadow-sm" id="btnNuevoServicio">
                <i class="bi bi-plus-circle me-2"></i> Nuevo Registro
            </button>
        </header>

        <div class="card card-custom p-4 bg-white shadow-sm">
            <table id="tablaServicios" class="table table-hover w-100">
                <thead class="table-light">
                <tr>
                    <th>Fecha</th>
                    <th>Mascota</th>
                    <th>Dueño</th>
                    <th>Servicio</th>
                    <th>Precio (S/)</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
</div>

<!-- Modal para Registro -->
<div class="modal fade" id="modalServicio" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formServicio">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Registrar Servicio</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Nombre Mascota</label>
                            <input type="text" id="nombreMascota" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Especie</label>
                            <select id="especie" class="form-select">
                                <option value="Perro">Perro</option>
                                <option value="Gato">Gato</option>
                            </select>
                        </div>

                        <!-- DNI con lupa y Nombre -->
                        <div class="col-md-5">
                            <label class="form-label small fw-bold">DNI Dueño</label>
                            <div class="input-group">
                                <input type="text" id="dniDueno" class="form-control" maxlength="8" placeholder="DNI">
                                <button class="btn btn-outline-primary" type="button" id="btnBuscarDni" title="Buscar en RENIEC">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-7">
                            <label class="form-label small fw-bold">Nombre del Dueño</label>
                            <input type="text" id="nombreDueno" class="form-control" required>
                        </div>

                        <!-- Servicio Dinámico -->
                        <div class="col-12">
                            <label class="form-label small fw-bold">Tipo de Servicio</label>
                            <div class="input-group">
                                <select id="tipoServicioSelect" class="form-select"></select>
                                <input type="text" id="tipoServicioInput" class="form-control d-none" placeholder="Escribe el nombre del nuevo servicio...">
                                <button class="btn btn-outline-secondary" type="button" id="btnAlternarTipo" title="Añadir nuevo servicio">
                                    <i class="bi bi-plus-lg"></i> Nuevo
                                </button>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-bold">Detalles / Observaciones</label>
                            <textarea id="detallesExtra" class="form-control" rows="2" placeholder="Ej: Shampoo de avena, corte estilo león..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-danger">Precio a Cobrar (S/)</label>
                            <input type="number" id="precio" class="form-control form-control-lg fw-bold" step="0.50" required>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Registro</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/banos-cortes.js}"></script>

</body>
</html>
