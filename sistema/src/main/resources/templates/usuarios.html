<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/usuarios/listar')}"></div>

    <main class="main-content w-100">
        <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">Gestión de Usuarios</h2>
            <button id="btnNuevoRegistro" class="btn fw-bold" style="background-color: var(--vet-red); color: white;">
                <i class="bi bi-person-plus-fill me-1"></i> Nuevo Usuario
            </button>
        </header>

        <div class="card card-custom p-4 bg-white">
            <table id="tablaUsuarios" class="table table-hover w-100">
                <thead class="table-light">
                <tr>
                    <th>Nombre Completo</th>
                    <th>Usuario (Login)</th>
                    <th>Perfil Asignado</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal fade" id="usuarioModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background-color: var(--vet-blue); color: white;">
                <h5 class="modal-title" id="modalTitle">Agregar Usuario</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formUsuario">
                    <input type="hidden" id="id" name="id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted">Nombre Completo:</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Nombre de Usuario (Login):</label>
                            <input type="text" id="usuario" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Contraseña:</label>
                            <input type="password" id="clave" class="form-control" placeholder="Obligatorio para nuevos">
                            <small class="text-secondary" id="claveHelp" style="display:none;">Déjalo en blanco para mantener la contraseña actual.</small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Perfil de Acceso:</label>
                            <select id="id_perfil" class="form-select" required>
                                <option value="">Seleccione un perfil...</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="formUsuario" class="btn" style="background-color: var(--vet-blue); color: white;">Guardar Usuario</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/usuarios.js}"></script>

</body>
</html>
