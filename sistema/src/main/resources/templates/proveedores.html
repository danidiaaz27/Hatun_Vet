<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Proveedores - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/proveedores/listar')}"></div>

    <main class="main-content w-100">
        <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">Gestión de Proveedores</h2>
            <button id="btnNuevoProveedor" class="btn fw-bold" style="background-color: var(--vet-red); color: white;">
                <i class="bi bi-plus-circle-fill me-1"></i> Nuevo Proveedor
            </button>
        </header>

        <div class="card card-custom p-4 bg-white shadow-sm">
            <table id="tablaProveedores" class="table table-hover w-100 align-middle">
                <thead class="table-light">
                <tr>
                    <th>Proveedor</th>
                    <th>RUC</th>
                    <th>Contacto</th>
                    <th>Dirección</th>
                    <th class="text-center">Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal fade" id="proveedorModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form id="formProveedor">
                <div class="modal-header" style="background-color: var(--vet-blue); color: white;">
                    <h5 class="modal-title" id="modalTitle">Nuevo Proveedor</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="id">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label text-muted">Nombre / Razón social</label>
                            <input type="text" id="nombre" class="form-control" maxlength="150" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted">RUC</label>
                            <div class="input-group">
                                <input type="text" id="ruc" class="form-control" maxlength="11" required>
                                <button class="btn btn-outline-primary" type="button" id="btnBuscarRuc" title="Buscar en SUNAT">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Persona de contacto</label>
                            <input type="text" id="contacto" class="form-control" maxlength="120">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Teléfono</label>
                            <input type="text" id="telefono" class="form-control" maxlength="20">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label text-muted">Correo</label>
                            <input type="email" id="correo" class="form-control" maxlength="120">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted">Estado</label>
                            <select id="estado" class="form-select" required>
                                <option value="true">Activo</option>
                                <option value="false">Inactivo</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-muted">Dirección</label>
                            <textarea id="direccion" class="form-control" rows="2" maxlength="250"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn" style="background-color: var(--vet-blue); color: white;">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/proveedores.js}"></script>

</body>
</html>
