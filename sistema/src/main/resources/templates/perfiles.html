<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Perfiles - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css"
        href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <link th:href="@{/css/perfiles.css}" rel="stylesheet">
</head>

<body>

    <div class="d-flex">
        <div th:replace="~{sidebar :: sidebar(activeUri='/perfiles/listar')}"></div>

        <main class="main-content w-100">
            <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">Gestión de Perfiles</h2>

                <button id="btnNuevoRegistro" class="btn fw-bold" style="background-color: var(--vet-red); color: white;">
                    <i class="bi bi-plus-lg me-1"></i> Nuevo Perfil
                </button>
            </header>

            <div class="card card-custom p-4 bg-white">
                <table id="tablaPerfiles" class="table table-hover w-100">
                    <thead class="table-light">
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- MODAL PERFIL -->
    <div class="modal fade" id="perfilModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content perfil-form-modal">
                <div class="modal-header perfil-form-header">
                    <h5 class="modal-title" id="modalTitle">Agregar Perfil</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="formPerfil">
                        <input type="hidden" id="id" name="id">

                        <div class="mb-3">
                            <label class="form-label text-muted">Nombre del Perfil:</label>
                            <input type="text" id="nombre" class="form-control" maxlength="50" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted">Descripción:</label>
                            <textarea id="descripcion" class="form-control" rows="3" maxlength="255"></textarea>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="formPerfil" class="btn perfil-btn-guardar">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PERMISOS -->
    <div class="modal fade" id="permisosModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content permisos-modal-content">

                <div class="modal-header permisos-modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-shield-lock-fill me-2"></i>
                        Asignar Accesos:
                        <span id="permisoPerfilNombre" class="permisos-title-role"></span>
                    </h5>

                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body permisos-modal-body">
                    <input type="hidden" id="permisoPerfilId">

                    <div class="permisos-resumen">
                        <div class="d-flex align-items-center gap-3">
                            <div class="permisos-avatar">
                                <i class="bi bi-person-badge-fill"></i>
                            </div>

                            <div>
                                <h6 id="permisoPerfilNombreResumen" class="permisos-resumen-titulo mb-1">
                                    Perfil seleccionado
                                </h6>
                                <p id="permisoPerfilDescripcion" class="permisos-resumen-texto mb-0">
                                    Perfil del sistema
                                </p>
                            </div>
                        </div>

                        <div class="permisos-contador-box">
                            <span>Seleccionados</span>
                            <strong id="contadorPermisos">0 / 0</strong>
                        </div>
                    </div>

                    <div class="permisos-actions">
                        <button type="button" id="btnMarcarTodosPermisos" class="btn permisos-btn-marcar">
                            <i class="bi bi-check-circle-fill me-1"></i> Marcar todos
                        </button>

                        <button type="button" id="btnLimpiarPermisos" class="btn permisos-btn-limpiar">
                            <i class="bi bi-trash-fill me-1"></i> Limpiar
                        </button>
                    </div>

                    <div id="listaOpciones" class="permisos-grid"></div>
                </div>

                <div class="modal-footer permisos-modal-footer">
                    <button type="button" class="btn permisos-btn-cerrar" data-bs-dismiss="modal">
                        Cerrar
                    </button>

                    <button type="button" id="btnGuardarPermisos" class="btn permisos-btn-actualizar">
                        <i class="bi bi-save-fill me-1"></i> Actualizar Permisos
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script th:src="@{/js/perfiles/perfiles-utils.js}"></script>
    <script th:src="@{/js/perfiles/perfiles-tabla.js}"></script>
    <script th:src="@{/js/perfiles/perfiles-form.js}"></script>
    <script th:src="@{/js/perfiles/perfiles-editar.js}"></script>
    <script th:src="@{/js/perfiles/perfiles-permisos.js}"></script>
    <script th:src="@{/js/perfiles/perfiles-eliminar.js}"></script>
    <script th:src="@{/js/perfiles/perfiles-main.js}"></script>
</body>

</html>
