<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Ventas - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <style>
        .kpi-mini { border-left: 4px solid var(--vet-blue); border-radius: .6rem; }
        #tablaReporteVentas thead th { background:#f6f9fd; font-size:.75rem; text-transform:uppercase; }
    </style>
</head>
<body>

<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/reportes/ventas')}"></div>

    <main class="main-content w-100 p-4 bg-light">
        <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <div>
                <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">
                    <i class="bi bi-file-earmark-bar-graph me-2"></i> Reporte de Ventas
                </h2>
                <small class="text-muted">Filtra, analiza y exporta el historial de comprobantes</small>
            </div>
            <a href="/reportes" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i> Volver al Dashboard</a>
        </header>

        <div class="card border-0 shadow-sm p-3 mb-3">
            <div class="row g-3 align-items-end">
                <div class="col-md-2">
                    <label class="form-label small fw-bold text-muted">Fecha Desde</label>
                    <input type="date" id="rvFechaDesde" class="form-control form-control-sm">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold text-muted">Fecha Hasta</label>
                    <input type="date" id="rvFechaHasta" class="form-control form-control-sm">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Tipo de Comprobante</label>
                    <select id="rvTipoComprobante" class="form-select form-select-sm">
                        <option value="">Todos</option>
                        <option value="01">Factura</option>
                        <option value="03">Boleta</option>
                        <option value="00">Nota de Venta</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Estado</label>
                    <select id="rvEstado" class="form-select form-select-sm">
                        <option value="">Todos</option>
                        <option value="FACTURADO">Facturado</option>
                        <option value="PENDIENTE_ENVIO">Pendiente de Envío</option>
                        <option value="ERROR_FACTURACION">Error de Facturación</option>
                        <option value="RECHAZADO_SUNAT">Rechazado por SUNAT</option>
                        <option value="NOTA_VENTA">Nota de Venta</option>
                        <option value="ANULADO">Anulado</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button id="rvBtnBuscar" class="btn btn-sm w-100 fw-bold" style="background:var(--vet-blue,#0A3D91);color:#fff;">
                        <i class="bi bi-search"></i> Buscar
                    </button>
                    <button id="rvBtnLimpiar" class="btn btn-sm btn-outline-secondary w-100">Limpiar</button>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-md-3">
                <div class="card kpi-mini border-0 shadow-sm p-3">
                    <small class="text-muted fw-bold text-uppercase">N° Comprobantes</small>
                    <h4 class="fw-bold mb-0" id="rvKpiCantidad">0</h4>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-mini border-0 shadow-sm p-3" style="border-left-color:#198754;">
                    <small class="text-muted fw-bold text-uppercase">Monto Total</small>
                    <h4 class="fw-bold mb-0 text-success" id="rvKpiTotal">S/ 0.00</h4>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-mini border-0 shadow-sm p-3" style="border-left-color:#fd7e14;">
                    <small class="text-muted fw-bold text-uppercase">Ticket Promedio</small>
                    <h4 class="fw-bold mb-0 text-warning" id="rvKpiPromedio">S/ 0.00</h4>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-mini border-0 shadow-sm p-3" style="border-left-color:#6f42c1;">
                    <small class="text-muted fw-bold text-uppercase">IGV Total</small>
                    <h4 class="fw-bold mb-0" style="color:#6f42c1;" id="rvKpiIgv">S/ 0.00</h4>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                <h6 class="fw-bold mb-0 text-uppercase text-muted">
                    Detalle de Comprobantes <small class="text-muted normal-case">(10 por página)</small>
                </h6>
                <div class="d-flex gap-2">
                    <button id="rvBtnExcel" class="btn btn-sm btn-success fw-bold shadow-sm">
                        <i class="bi bi-file-earmark-excel me-1"></i> Excel
                    </button>
                    <button id="rvBtnPdf" class="btn btn-sm btn-danger fw-bold shadow-sm">
                        <i class="bi bi-file-earmark-pdf me-1"></i> PDF
                    </button>
                </div>
            </div>
            <div class="table-responsive p-2">
                <table id="tablaReporteVentas" class="table table-hover align-middle w-100">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Comprobante</th>
                            <th>Tipo</th>
                            <th>Cliente</th>
                            <th>Doc.</th>
                            <th>Estado</th>
                            <th>Medio Pago</th>
                            <th class="text-end">Subtotal</th>
                            <th class="text-end">IGV</th>
                            <th class="text-end">Total</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:src="@{/js/reportes-ventas/reportes-ventas.js}"></script>
</body>
</html>
