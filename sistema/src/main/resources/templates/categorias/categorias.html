<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías - HatunVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>

<body>

    <div class="d-flex">
        <div th:replace="~{sidebar :: sidebar(activeUri='/categorias')}"></div>

        <main class="main-content w-100">
            <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                <h2 class="h4 mb-0 fw-bold" style="color: var(--vet-blue)">Categorías de Productos</h2>
                <button id="btnNuevoRegistro" class="btn fw-bold"
                    style="background-color: var(--vet-red); color: white;">
                    <i class="bi bi-plus-circle-fill me-1"></i> Nueva Categoría
                </button>
            </header>

            <div class="card card-custom p-4 bg-white">
                <table id="tablaCategorias" class="table table-hover w-100 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="modal fade" id="categoriaModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header" style="background-color: var(--vet-blue); color: white;">
                    <h5 class="modal-title" id="modalTitle">Agregar Categoría</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light p-4">
                    <form id="formCategoria">
                        <input type="hidden" id="id" name="id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Nombre de la Categoría *</label>
                            <input type="text" id="nombre" class="form-control" maxlength="100"
                                placeholder="Ej. Alimentos Medicados" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Descripción (Opcional)</label>
                            <textarea id="descripcion" class="form-control" rows="3" maxlength="255"
                                placeholder="Detalle breve sobre los productos..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-white border-top-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="formCategoria" class="btn px-4"
                        style="background-color: var(--vet-blue); color: white;"
                        id="btnSubmitCategoria">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/categorias/categorias-tabla.js}"></script>
    <script th:src="@{/js/categorias/categorias-form.js}"></script>
    <script th:src="@{/js/categorias/categorias-acciones.js}"></script>
    <script th:src="@{/js/categorias/categorias-main.js}"></script>

</body>

</html>
