<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar(activeUri)">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <nav id="sidebar" class="sidebar d-flex flex-column flex-shrink-0 p-3 text-white">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <a th:href="@{/dashboard}" class="fs-4 text-white text-decoration-none fw-bold">
                <span class="text-white">Hatun</span><span style="color: #D32F2F;">Vet</span>
            </a>
            <button id="close-sidebar" class="btn btn-link text-white d-md-none p-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-x-lg" viewBox="0 0 16 16"><path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z"/></svg>
            </button>
        </div>
        <hr style="background-color: rgba(255,255,255,0.3)">
        <ul class="nav nav-pills flex-column mb-auto">
            <li th:each="opcion : ${session.menuOpciones}" class="nav-item">
                <a th:href="@{${opcion.ruta}}"
                   class="nav-link text-white mb-1"
                   th:classappend="${opcion.ruta == activeUri} ? 'active-link' : ''">
                    <i th:class="${opcion.icono} + ' me-2'"></i>
                    <span th:text="${opcion.nombre}"></span>
                </a>
            </li>
        </ul>
        <hr style="background-color: rgba(255,255,255,0.3)">
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                <strong th:text="${session.usuarioLogueado.nombre}">Usuario</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
                <li><a class="dropdown-item" th:href="@{/logout}">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>
</div>
</body>
</html>
